name: Publish Wiki

on:
    push:
        branches: [ dev ]
        paths:
            - "wiki/**"
            - ".github/workflows/wiki.yml"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    publish-wiki:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Clone wiki repository
              run: |
                  git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo

            - name: Check wiki source
              run: |
                  test -d wiki
                  test "$(ls -A wiki)"

            - name: Sync wiki files
              run: |
                  find wiki-repo -mindepth 1 -delete
                  cp -r wiki/* wiki-repo/

            - name: Commit and push wiki
              run: |
                  cd wiki-repo
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add .
                  git diff --cached --quiet && exit 0

                  git commit -m "docs: sync wiki from repository"
                  git push
